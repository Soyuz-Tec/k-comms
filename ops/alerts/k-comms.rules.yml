groups:
  - name: k-comms
    rules:
      - alert: KCommsHighMessageCommitLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(k_comms_message_commit_duration_seconds_bucket[5m]))) > 0.5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: Message commit p99 exceeds 500ms
          runbook_url: https://github.com/Soyuz-Tec/k-comms/blob/main/docs/08-reliability/runbooks/service-degradation.md
      - alert: KCommsObanQueueBacklog
        expr: k_comms_oban_queue_age_seconds > 300
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: Durable work has been queued for more than five minutes
          runbook_url: https://github.com/Soyuz-Tec/k-comms/blob/main/docs/08-reliability/runbooks/queue-backlog.md
