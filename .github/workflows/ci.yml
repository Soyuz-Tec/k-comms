name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: k_comms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d k_comms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5432/k_comms_test
      K_COMMS_TEST_S3_HOST: 127.0.0.1
      K_COMMS_TEST_S3_PORT: "9000"
      K_COMMS_TEST_S3_BUCKET: k-comms-test
      K_COMMS_TEST_S3_ACCESS_KEY_ID: kcomms-test
      K_COMMS_TEST_S3_SECRET_ACCESS_KEY: k-comms-test-password
      MINIO_IMAGE: docker.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:a1a8bd4ac40ad7881a245bab97323e18f971e4d4cba2c2007ec1bedd21cbaba2
      MINIO_MC_IMAGE: docker.io/minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:eb4ea9884b77704230e2423e9004d2fa738dc272876b9cc41a297d29443b8780
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: erlef/setup-beam@0f75c29430f34bb5af4cce5e3b7f6a8860fca236 # v1
        with:
          otp-version: "29.0"
          elixir-version: "1.20.1"
          version-type: strict
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.exs', 'apps/*/mix.exs', 'mix.lock') }}
          restore-keys: ${{ runner.os }}-beam-
      - run: mix local.hex --force
      - run: mix local.rebar --force
      - run: mix deps.get --check-locked
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix ecto.create
      - run: mix ecto.migrate
      - name: Start versioned S3 integration fixture
        shell: bash
        run: |
          set -euo pipefail
          docker run --detach \
            --name k-comms-ci-minio \
            --publish "127.0.0.1:${K_COMMS_TEST_S3_PORT}:9000" \
            --env "MINIO_ROOT_USER=${K_COMMS_TEST_S3_ACCESS_KEY_ID}" \
            --env "MINIO_ROOT_PASSWORD=${K_COMMS_TEST_S3_SECRET_ACCESS_KEY}" \
            "$MINIO_IMAGE" server /data

          for attempt in $(seq 1 30); do
            if curl --fail --silent \
              "http://${K_COMMS_TEST_S3_HOST}:${K_COMMS_TEST_S3_PORT}/minio/health/ready" \
              >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              docker logs k-comms-ci-minio
              exit 1
            fi

            sleep 1
          done

          docker run --rm --network host \
            --env "MINIO_ROOT_USER=${K_COMMS_TEST_S3_ACCESS_KEY_ID}" \
            --env "MINIO_ROOT_PASSWORD=${K_COMMS_TEST_S3_SECRET_ACCESS_KEY}" \
            --env "S3_BUCKET=${K_COMMS_TEST_S3_BUCKET}" \
            --env "S3_ENDPOINT=http://${K_COMMS_TEST_S3_HOST}:${K_COMMS_TEST_S3_PORT}" \
            --entrypoint /bin/sh \
            "$MINIO_MC_IMAGE" -c '
              set -eu
              mc alias set local "$S3_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing "local/$S3_BUCKET"
              mc version enable "local/$S3_BUCKET"
              version_info="$(mc version info "local/$S3_BUCKET")"
              printf "%s\n" "$version_info"
              case "$version_info" in
                *"versioning is enabled"*) ;;
                *) echo "bucket versioning was not enabled" >&2; exit 1 ;;
              esac
            '
      - run: mix test --warnings-as-errors
      - name: Stop S3 integration fixture
        if: always()
        shell: bash
        run: docker rm --force k-comms-ci-minio >/dev/null 2>&1 || true
      - run: mix sobelow --root apps/comms_web --private --exit medium --threshold medium
      - run: mix hex.audit
      - run: MIX_ENV=prod mix deps.get --only prod --check-locked
      - run: MIX_ENV=prod mix compile --warnings-as-errors
      - run: MIX_ENV=prod mix release k_comms

  web:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build

  validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-validation.txt
      - run: python -m pip install --requirement requirements-validation.txt
      - run: python scripts/validate_contracts.py
      - run: python scripts/validate_docs.py
      - run: python scripts/test_validate_architecture.py
      - run: python scripts/validate_architecture.py
      - run: python scripts/test_validate_staging_secrets.py
      - run: python scripts/test_validate_production_bundle.py
      - run: python scripts/test_collect_release_evidence.py

  qualification-scripts:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: node --test scripts/staging_acceptance.test.mjs scripts/staging_product_acceptance.test.mjs scripts/staging_load.test.mjs scripts/score_usability_study.test.mjs

  manifests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      KUBECONFORM_VERSION: 0.8.0
      KUBECONFORM_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
        with:
          version: v1.34.1
      - name: Install checksum-verified kubeconform
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/kubeconform.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" kubeconform
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Render staging manifests
        shell: bash
        run: |
          set -euo pipefail
          overlay=deploy/k8s/overlays/staging
          cp "$overlay/secrets.env.example" "$overlay/secrets.env"
          trap 'rm -f "$overlay/secrets.env"' EXIT
          kubectl kustomize "$overlay" > "$RUNNER_TEMP/k-comms-staging.yaml"
          kubectl kustomize "$overlay/bootstrap" > "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          kubectl kustomize deploy/k8s/overlays/local-proof > "$RUNNER_TEMP/k-comms-local-proof.yaml"
          kubectl kustomize deploy/k8s/overlays/production > "$RUNNER_TEMP/k-comms-production.yaml"
          kubectl kustomize deploy/k8s/operations/platform-role > "$RUNNER_TEMP/k-comms-platform-role.yaml"
          kubectl kustomize deploy/k8s/operations/attachment-restore-remap > "$RUNNER_TEMP/k-comms-attachment-restore-remap.yaml"
          test -s "$RUNNER_TEMP/k-comms-staging.yaml"
          test -s "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          test -s "$RUNNER_TEMP/k-comms-local-proof.yaml"
          test -s "$RUNNER_TEMP/k-comms-production.yaml"
          test -s "$RUNNER_TEMP/k-comms-platform-role.yaml"
          test -s "$RUNNER_TEMP/k-comms-attachment-restore-remap.yaml"
          grep -q '^kind: Deployment$' "$RUNNER_TEMP/k-comms-staging.yaml"
          grep -q '^kind: Job$' "$RUNNER_TEMP/k-comms-staging.yaml"
          grep -q '^  name: k-comms-bootstrap$' "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          grep -q 'CommsCore.Release.bootstrap()' "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          test "$(grep -c 'ERL_AFLAGS= /app/bin/k_comms rpc' "$RUNNER_TEMP/k-comms-staging.yaml")" -eq 3
          test "$(grep -c '^kind: HorizontalPodAutoscaler$' "$RUNNER_TEMP/k-comms-production.yaml")" -eq 2
          test "$(grep -c '^kind: PodDisruptionBudget$' "$RUNNER_TEMP/k-comms-production.yaml")" -eq 2
          ! grep -q '^kind: StatefulSet$' "$RUNNER_TEMP/k-comms-production.yaml"
          ! grep -q 'K_COMMS_PLATFORM_ROLE_MANAGEMENT_SECRET' "$RUNNER_TEMP/k-comms-staging.yaml"
          ! grep -q 'K_COMMS_PLATFORM_ROLE_MANAGEMENT_SECRET' "$RUNNER_TEMP/k-comms-production.yaml"
          grep -q 'K_COMMS_PLATFORM_ROLE_TTL_SECONDS' "$RUNNER_TEMP/k-comms-platform-role.yaml"
          grep -q 'K_COMMS_RESTORE_VERSION_REMAP' "$RUNNER_TEMP/k-comms-attachment-restore-remap.yaml"
          grep -q 'CommsWorkers.Release.remap_restored_attachment_versions()' "$RUNNER_TEMP/k-comms-attachment-restore-remap.yaml"
          ! grep -q 'name: k-comms-bootstrap$' deploy/k8s/overlays/local-proof/acceptance-job.yaml
          test "$(grep -c '^[[:space:]]*name: k-comms-qualification$' deploy/k8s/overlays/local-proof/acceptance-job.yaml)" -eq 3
          test "$(grep -c -- '- name: PUSH_SUBSCRIPTION_ENCRYPTION_KEY$' "$RUNNER_TEMP/k-comms-staging.yaml")" -eq 2
          test "$(grep -c -- '- name: PUSH_SUBSCRIPTION_ENCRYPTION_KEY$' "$RUNNER_TEMP/k-comms-production.yaml")" -eq 2
          test "$(grep -c -- '- name: PUSH_SUBSCRIPTION_ENCRYPTION_KEYS$' "$RUNNER_TEMP/k-comms-production.yaml")" -eq 2
          test "$(grep -c -- '- name: WEBHOOK_SECRET_ENCRYPTION_KEYS$' "$RUNNER_TEMP/k-comms-production.yaml")" -eq 2
      - name: Validate staging manifests against pinned Kubernetes schemas
        shell: bash
        run: |
          set -euo pipefail
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.34.0 \
            "$RUNNER_TEMP/k-comms-staging.yaml" \
            "$RUNNER_TEMP/k-comms-bootstrap.yaml" \
            "$RUNNER_TEMP/k-comms-local-proof.yaml" \
            "$RUNNER_TEMP/k-comms-production.yaml" \
            "$RUNNER_TEMP/k-comms-platform-role.yaml" \
            "$RUNNER_TEMP/k-comms-attachment-restore-remap.yaml" \
            deploy/k8s/overlays/local-proof/acceptance-job.yaml

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TRIVY_IMAGE: docker.io/aquasec/trivy:0.72.0@sha256:c6e969c5662a546ad5de4a73c2a6b7a7c627f86d916903e175aa623af5b97ada
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4
        with:
          version: v1.34.1
      - name: Scan dependencies and repository secrets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/trivy-cache"
          docker run --rm \
            --volume "$PWD:/workspace:ro" \
            --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            "$TRIVY_IMAGE" fs \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-version-check \
            --skip-dirs /workspace/.git \
            --skip-dirs /workspace/deps \
            --skip-dirs /workspace/_build \
            --skip-dirs /workspace/clients/web/node_modules \
            --skip-dirs /workspace/clients/web/dist \
            --exit-code 1 \
            /workspace
      - name: Scan rendered production infrastructure
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize deploy/k8s/overlays/production \
            -o "$RUNNER_TEMP/k-comms-production-security.yaml"
          docker run --rm \
            --volume "$PWD:/workspace:ro" \
            --volume "$RUNNER_TEMP:/scan:ro" \
            --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            "$TRIVY_IMAGE" config \
            --ignorefile /workspace/.trivyignore \
            --severity HIGH,CRITICAL \
            --skip-version-check \
            --exit-code 1 \
            /scan/k-comms-production-security.yaml
      - name: Scan the release container
        shell: bash
        run: |
          set -euo pipefail
          docker build --target runtime --tag k-comms:ci .
          docker save --output "$RUNNER_TEMP/k-comms-ci.tar" k-comms:ci
          docker run --rm \
            --volume "$RUNNER_TEMP:/scan:ro" \
            --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            "$TRIVY_IMAGE" image \
            --input /scan/k-comms-ci.tar \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-version-check \
            --exit-code 1

  codeql:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
      - uses: github/codeql-action/analyze@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          category: /language:javascript-typescript
