name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: k_comms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d k_comms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5432/k_comms_test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29.0"
          elixir-version: "1.20.1"
          version-type: strict
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.exs', 'apps/*/mix.exs', 'mix.lock') }}
          restore-keys: ${{ runner.os }}-beam-
      - run: mix local.hex --force
      - run: mix local.rebar --force
      - run: mix deps.get --check-locked
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix test --warnings-as-errors
      - run: mix hex.audit
      - run: MIX_ENV=prod mix deps.get --only prod --check-locked
      - run: MIX_ENV=prod mix compile --warnings-as-errors
      - run: MIX_ENV=prod mix release k_comms

  web:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-validation.txt
      - run: python -m pip install --requirement requirements-validation.txt
      - run: python scripts/validate_contracts.py
      - run: python scripts/validate_docs.py

  manifests:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      KUBECONFORM_VERSION: 0.8.0
      KUBECONFORM_SHA256: 9bc2bffbf71f261128533edaf912153948b7ff238f9a531ae6d34466ec287883
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.34.1
      - name: Install checksum-verified kubeconform
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/kubeconform.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" kubeconform
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Render staging manifests
        shell: bash
        run: |
          set -euo pipefail
          overlay=deploy/k8s/overlays/staging
          cp "$overlay/secrets.env.example" "$overlay/secrets.env"
          trap 'rm -f "$overlay/secrets.env"' EXIT
          kubectl kustomize "$overlay" > "$RUNNER_TEMP/k-comms-staging.yaml"
          kubectl kustomize "$overlay/bootstrap" > "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          test -s "$RUNNER_TEMP/k-comms-staging.yaml"
          test -s "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          grep -q '^kind: Deployment$' "$RUNNER_TEMP/k-comms-staging.yaml"
          grep -q '^kind: Job$' "$RUNNER_TEMP/k-comms-staging.yaml"
          grep -q '^  name: k-comms-bootstrap$' "$RUNNER_TEMP/k-comms-bootstrap.yaml"
          grep -q 'CommsCore.Release.bootstrap()' "$RUNNER_TEMP/k-comms-bootstrap.yaml"
      - name: Validate staging manifests against pinned Kubernetes schemas
        shell: bash
        run: |
          set -euo pipefail
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.34.0 \
            "$RUNNER_TEMP/k-comms-staging.yaml" \
            "$RUNNER_TEMP/k-comms-bootstrap.yaml"
