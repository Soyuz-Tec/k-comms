name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: k_comms_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d k_comms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@localhost:5432/k_comms_test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '29.0'
          elixir-version: '1.20.1'
          version-type: strict
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-beam-${{ hashFiles('mix.exs', 'apps/*/mix.exs', 'mix.lock') }}
      - run: mix local.hex --force
      - run: mix local.rebar --force
      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix ecto.create
      - run: mix ecto.migrate
      - run: mix test
      - run: MIX_ENV=prod mix deps.get --only prod
      - run: MIX_ENV=prod mix compile --warnings-as-errors
      - run: MIX_ENV=prod mix release k_comms
  documentation:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: python3 scripts/validate_contracts.py
      - run: python3 scripts/validate_docs.py
