name: Container

on:
  pull_request:
    paths:
      - Dockerfile
      - compose.yaml
      - mix.exs
      - mix.lock
      - "apps/**"
      - "clients/web/**"
      - "config/**"
      - "deploy/k8s/**"
      - "scripts/container_smoke.sh"
      - "scripts/validate_compose_exposure.py"
      - "scripts/test_validate_compose_exposure.py"
      - ".github/workflows/container.yml"
  push:
    branches: [main]
    paths:
      - Dockerfile
      - compose.yaml
      - mix.exs
      - mix.lock
      - "apps/**"
      - "clients/web/**"
      - "config/**"
      - "scripts/container_smoke.sh"
      - "scripts/validate_compose_exposure.py"
      - "scripts/test_validate_compose_exposure.py"
      - ".github/workflows/container.yml"
  workflow_dispatch:

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate local Compose exposure policy
        shell: bash
        run: |
          set -euo pipefail
          python scripts/test_validate_compose_exposure.py
          python scripts/validate_compose_exposure.py
      - name: Build, migrate, boot, and smoke the runtime image
        shell: bash
        env:
          CONTAINER_ENGINE: docker
          IMAGE: k-comms:ci
          OCI_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          OCI_REVISION: ${{ github.sha }}
          OCI_VERSION: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
        run: bash scripts/container_smoke.sh

  publish:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    env:
      TRIVY_IMAGE: docker.io/aquasec/trivy:0.72.0@sha256:c6e969c5662a546ad5de4a73c2a6b7a7c627f86d916903e175aa623af5b97ada
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate local Compose exposure policy
        shell: bash
        run: |
          set -euo pipefail
          python scripts/test_validate_compose_exposure.py
          python scripts/validate_compose_exposure.py
      - name: Define immutable image coordinates
        id: image
        shell: bash
        run: |
          set -euo pipefail
          repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          tag="sha-${GITHUB_SHA}"
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"
          echo "image=${repository}:${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Build, migrate, boot, and smoke the exact publication image
        shell: bash
        env:
          CONTAINER_ENGINE: docker
          IMAGE: ${{ steps.image.outputs.image }}
          OCI_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          OCI_REVISION: ${{ github.sha }}
          OCI_VERSION: ${{ steps.image.outputs.version }}
        run: bash scripts/container_smoke.sh
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image and capture registry digest
        id: push
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail
          push_log="${RUNNER_TEMP}/k-comms-container-push.log"
          docker push "${IMAGE}" 2>&1 | tee "${push_log}"
          digest="$(sed -nE 's/.*digest: (sha256:[0-9a-f]{64}).*/\1/p' "${push_log}" | tail -n 1)"
          if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "docker push did not return a valid sha256 digest" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE}@${digest}" >> "${GITHUB_STEP_SUMMARY}"
      - name: Generate CycloneDX SBOM for the publication image
        id: sbom
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/k-comms-publication.tar"
          sbom_path="${RUNNER_TEMP}/k-comms-${GITHUB_SHA}.cdx.json"
          trap 'rm -f "${archive}"' EXIT

          docker save --output "${archive}" "${IMAGE}"
          docker run --rm \
            --volume "${RUNNER_TEMP}:/scan" \
            "${TRIVY_IMAGE}" image \
            --input "/scan/$(basename "${archive}")" \
            --scanners vuln \
            --format cyclonedx \
            --output "/scan/$(basename "${sbom_path}")" \
            --skip-version-check

          SBOM_PATH="${sbom_path}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["SBOM_PATH"])
          document = json.loads(path.read_text(encoding="utf-8"))
          if document.get("bomFormat") != "CycloneDX":
              raise SystemExit("Trivy output is not a CycloneDX SBOM")
          if not document.get("serialNumber") or not document.get("specVersion"):
              raise SystemExit("CycloneDX identity fields are missing")
          if not document.get("components"):
              raise SystemExit("CycloneDX SBOM contains no components")
          PY

          echo "path=${sbom_path}" >> "${GITHUB_OUTPUT}"
          echo "CycloneDX SBOM: $(sha256sum "${sbom_path}" | cut -d' ' -f1)" >> "${GITHUB_STEP_SUMMARY}"
      - name: Retain CycloneDX SBOM with the workflow run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: k-comms-sbom-${{ github.sha }}
          path: ${{ steps.sbom.outputs.path }}
          if-no-files-found: error
          retention-days: 90
      - name: Attest image build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest image SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: ${{ steps.sbom.outputs.path }}
          push-to-registry: true
