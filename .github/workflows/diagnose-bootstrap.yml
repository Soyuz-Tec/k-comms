name: Diagnose bootstrap payload

on:
  pull_request:
    branches: [main]
    paths:
      - '.bootstrap/trigger-materialize'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Inspect staged payload
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          encoded=/tmp/k-comms.encoded
          payload=/tmp/k-comms.payload
          : > "$encoded"

          for part in 00 01 02; do
            url="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/contents/.bootstrap/part-$part.b64?ref=main"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              "$url" \
              | jq -r '.content' \
              | base64 --decode >> "$encoded"
          done

          echo "Encoded characters: $(tr -d '\r\n' < "$encoded" | wc -c)"
          tr -d '\r\n' < "$encoded" | base64 --decode > "$payload"
          echo "Decoded bytes: $(wc -c < "$payload")"
          echo "SHA-256: $(sha256sum "$payload" | cut -d' ' -f1)"
          echo "File type: $(file -b "$payload")"
          echo -n 'Magic: '
          xxd -p -l 24 "$payload"

          if tar -tzf "$payload" >/tmp/list 2>/tmp/tar-gzip-error; then
            echo "Archive probe: gzip tar ($(wc -l < /tmp/list) entries)"
          elif tar -tf "$payload" >/tmp/list 2>/tmp/tar-error; then
            echo "Archive probe: tar or auto-detected tar ($(wc -l < /tmp/list) entries)"
          elif unzip -tq "$payload" >/tmp/unzip-output 2>&1; then
            echo "Archive probe: zip ($(unzip -Z1 "$payload" | wc -l) entries)"
          else
            echo "Archive probe: no supported archive"
            echo "gzip-tar error: $(tr '\n' ' ' < /tmp/tar-gzip-error)"
            echo "tar error: $(tr '\n' ' ' < /tmp/tar-error)"
            echo "zip error: $(tr '\n' ' ' < /tmp/unzip-output)"
          fi
