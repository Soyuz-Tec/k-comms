asyncapi: 3.0.0
info:
  title: K-Comms Realtime Protocol
  version: 0.3.0
  description: Phoenix Channel commands and tenant-authorized events connected with a short-lived, one-time socket ticket minted over authenticated HTTPS.
defaultContentType: application/json
channels:
  conversation:
    address: conversation:{conversationId}
    parameters:
      conversationId:
        description: Conversation UUID authorized at join and for every command
    messages:
      command:
        $ref: '#/components/messages/Command'
      messageCreated:
        $ref: '#/components/messages/MessageCreated'
      messageUpdated:
        $ref: '#/components/messages/MessageUpdated'
      messageDeleted:
        $ref: '#/components/messages/MessageDeleted'
      reactionAdded:
        $ref: '#/components/messages/ReactionAdded'
      reactionRemoved:
        $ref: '#/components/messages/ReactionRemoved'
      readCursor:
        $ref: '#/components/messages/ReadCursor'
      membershipChanged:
        $ref: '#/components/messages/MembershipChanged'
      typing:
        $ref: '#/components/messages/Typing'
  userInbox:
    address: user:{userId}
    description: Content-free conversation-list, membership, and notification-availability events; a socket may join only its own user id.
    parameters:
      userId:
        description: Authenticated user UUID, equal to the socket identity
    messages:
      conversationActivity:
        $ref: '#/components/messages/ConversationActivity'
      conversationMembership:
        $ref: '#/components/messages/ConversationMembership'
      notificationAvailable:
        $ref: '#/components/messages/NotificationAvailable'
operations:
  sendConversationCommand:
    action: send
    channel: {$ref: '#/channels/conversation'}
    messages:
      - {$ref: '#/channels/conversation/messages/command'}
  receiveConversationEvent:
    action: receive
    channel: {$ref: '#/channels/conversation'}
    messages:
      - {$ref: '#/channels/conversation/messages/messageCreated'}
      - {$ref: '#/channels/conversation/messages/messageUpdated'}
      - {$ref: '#/channels/conversation/messages/messageDeleted'}
      - {$ref: '#/channels/conversation/messages/reactionAdded'}
      - {$ref: '#/channels/conversation/messages/reactionRemoved'}
      - {$ref: '#/channels/conversation/messages/readCursor'}
      - {$ref: '#/channels/conversation/messages/membershipChanged'}
      - {$ref: '#/channels/conversation/messages/typing'}
  receiveUserInboxEvent:
    action: receive
    channel: {$ref: '#/channels/userInbox'}
    messages:
      - {$ref: '#/channels/userInbox/messages/conversationActivity'}
      - {$ref: '#/channels/userInbox/messages/conversationMembership'}
      - {$ref: '#/channels/userInbox/messages/notificationAvailable'}
components:
  messages:
    Command:
      name: command
      payload:
        type: object
        additionalProperties: false
        required: [command_id, type, payload]
        properties:
          command_id: {type: string, minLength: 8, maxLength: 128}
          type:
            enum: [message.send.v1, conversation.read.v1, typing.start.v1, typing.stop.v1]
          payload: {type: object}
          client_time: {type: [string, 'null'], format: date-time}
    MessageCreated:
      name: message.created.v1
      payload:
        $ref: ../json-schema/message-created.v1.json
    MessageUpdated:
      name: message.updated.v1
      payload:
        $ref: ../json-schema/message-created.v1.json
    MessageDeleted:
      name: message.deleted.v1
      payload:
        $ref: ../json-schema/message-created.v1.json
    ReactionAdded:
      name: message.reaction_added.v1
      payload:
        type: object
        required: [message_id, user_id, emoji]
        properties:
          message_id: {type: string, format: uuid}
          user_id: {type: string, format: uuid}
          emoji: {type: string, minLength: 1, maxLength: 32}
    ReactionRemoved:
      name: message.reaction_removed.v1
      payload:
        type: object
        required: [message_id, user_id, emoji]
        properties:
          message_id: {type: string, format: uuid}
          user_id: {type: string, format: uuid}
          emoji: {type: string, minLength: 1, maxLength: 32}
    ReadCursor:
      name: conversation.read.v1
      payload:
        type: object
        required: [user_id, sequence]
        properties:
          user_id: {type: string, format: uuid}
          sequence: {type: integer, minimum: 0}
    MembershipChanged:
      name: membership.changed.v1
      description: Content-free membership delta emitted after committed administrative or self-service public-channel membership changes.
      payload:
        type: object
        additionalProperties: false
        required: [user_id, action]
        properties:
          user_id: {type: string, format: uuid}
          action: {enum: [added, removed, role_changed]}
          role: {enum: [member, moderator, owner]}
          version: {type: integer, minimum: 1}
          source: {enum: [administrative, self_service]}
    Typing:
      name: typing.v1
      payload:
        type: object
        required: [user_id, state]
        properties:
          user_id: {type: string, format: uuid}
          state: {enum: [started, stopped]}
    ConversationActivity:
      name: conversation.activity.v1
      payload:
        type: object
        additionalProperties: false
        required: [conversation_id, latest_sequence, event_type]
        properties:
          conversation_id: {type: string, format: uuid}
          latest_sequence: {type: integer, minimum: 1}
          event_type:
            enum: [message.created.v1, message.updated.v1, message.deleted.v1]
    ConversationMembership:
      name: conversation.membership.v1
      description: Content-free signal for refreshing the authenticated user's conversation and public-channel lists.
      payload:
        type: object
        additionalProperties: false
        required: [conversation_id, action]
        properties:
          conversation_id: {type: string, format: uuid}
          action: {enum: [added, removed]}
    NotificationAvailable:
      name: notification.available.v1
      description: Content-free signal instructing the authenticated client to reconcile its durable in-app notification state over REST.
      payload:
        type: object
        additionalProperties: false
        required: [notification_id, event_type, unread_count]
        properties:
          notification_id: {type: string, format: uuid}
          event_type: {type: string, minLength: 1, maxLength: 120}
          conversation_id: {type: [string, 'null'], format: uuid}
          message_id: {type: [string, 'null'], format: uuid}
          unread_count: {type: integer, minimum: 0}
