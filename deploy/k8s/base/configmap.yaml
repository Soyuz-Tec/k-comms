apiVersion: v1
kind: ConfigMap
metadata:
  name: k-comms-config
  labels:
    app.kubernetes.io/component: configuration
data:
  PORT: "4000"
  PHX_HOST: k-comms.example.invalid
  PUBLIC_APP_URL: https://k-comms.example.invalid
  PASSWORD_RECOVERY_TTL_SECONDS: "1800"
  PASSWORD_RECOVERY_RETENTION_SECONDS: "2592000"
  PASSWORD_RECOVERY_MIN_RESPONSE_MS: "500"
  PASSWORD_RECOVERY_JITTER_MS: "50"
  POOL_SIZE: "20"
  DATABASE_SSL: "false"
  ALLOW_BOOTSTRAP: "false"
  ACCESS_TOKEN_TTL_SECONDS: "900"
  SESSION_TTL_SECONDS: "2592000"
  SESSION_ABSOLUTE_TTL_SECONDS: "2592000"
  CORS_ORIGINS: https://k-comms.example.invalid
  HSTS_ENABLED: "true"
  CSP_CONNECT_SOURCES: "'self' wss://k-comms.example.invalid https://k-comms.example.invalid https://objects.example.invalid"
  S3_PUBLIC_ENDPOINT: https://objects.example.invalid
  S3_INTERNAL_SCHEME: http
  S3_INTERNAL_HOST: minio
  S3_INTERNAL_PORT: "9000"
  S3_INTERNAL_ENDPOINT: http://minio:9000
  S3_BUCKET: k-comms-staging
  S3_REGION: us-east-1
  S3_URL_TTL_SECONDS: "900"
  MINIO_API_CORS_ALLOW_ORIGIN: https://k-comms.example.invalid
  ALLOW_DEVELOPMENT_ADAPTERS: "false"
  NOTIFICATION_PROVIDER_MODE: disabled
  PUSH_SUBSCRIPTION_ENCRYPTION_KEY_ID: primary
  WEB_PUSH_VAPID_PUBLIC_KEY: ""
  ATTACHMENT_SCANNER_MODE: disabled
  WEBHOOK_PROVIDER_MODE: disabled
  WEBHOOK_ALLOWED_HOSTS: ""
  WEBHOOK_SECRET_ENCRYPTION_KEY_ID: primary
