apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - service-account.yaml
  - configmap.yaml
  - edge-deployment.yaml
  - worker-deployment.yaml
  - edge-service.yaml
  - cluster-service.yaml
  - pod-disruption-budget.yaml
  - network-policies.yaml
labels:
  - pairs:
      app.kubernetes.io/name: k-comms
      app.kubernetes.io/part-of: k-comms
      app.kubernetes.io/managed-by: kustomize
    # NetworkPolicy peer selectors intentionally target PostgreSQL and MinIO,
    # so do not inject application labels into every selector.
    includeSelectors: false
    includeTemplates: true
