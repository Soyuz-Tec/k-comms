apiVersion: batch/v1
kind: Job
metadata:
  name: k-comms-bootstrap
  labels:
    app.kubernetes.io/name: k-comms
    app.kubernetes.io/part-of: k-comms
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k-comms
        app.kubernetes.io/part-of: k-comms
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: Never
      serviceAccountName: k-comms
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: ghcr.io/soyuz-tec/k-comms:staging
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/k_comms"]
          args: ["eval", "CommsCore.Release.bootstrap()"]
          envFrom:
            - configMapRef:
                name: k-comms-config
            - secretRef:
                name: k-comms-bootstrap
          env:
            - name: K_COMMS_ROLE
              value: worker
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: SECRET_KEY_BASE
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: S3_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
