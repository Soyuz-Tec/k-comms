apiVersion: batch/v1
kind: Job
metadata:
  name: k-comms-acceptance
  namespace: k-comms-staging
  labels:
    app.kubernetes.io/name: k-comms-acceptance
    app.kubernetes.io/component: acceptance
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k-comms-acceptance
        app.kubernetes.io/component: acceptance
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: acceptance
          image: docker.io/library/node:22-bookworm-slim
          imagePullPolicy: IfNotPresent
          command: ["node", "/acceptance/staging_acceptance.mjs"]
          env:
            - name: K_COMMS_BASE_URL
              value: https://comms.k-comms.test
            - name: K_COMMS_OBJECT_URL
              value: https://objects.k-comms.test
            - name: K_COMMS_TIMEOUT_MS
              value: "120000"
            - name: K_COMMS_ATTACHMENT_BYTES
              value: "25000000"
            - name: NODE_EXTRA_CA_CERTS
              value: /ca/ca.crt
            - name: K_COMMS_TENANT_SLUG
              valueFrom:
                secretKeyRef:
                  name: k-comms-bootstrap
                  key: BOOTSTRAP_TENANT_SLUG
            - name: K_COMMS_OWNER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: k-comms-bootstrap
                  key: BOOTSTRAP_OWNER_EMAIL
            - name: K_COMMS_OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k-comms-bootstrap
                  key: BOOTSTRAP_OWNER_PASSWORD
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: acceptance-script
              mountPath: /acceptance
              readOnly: true
            - name: local-ca
              mountPath: /ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: acceptance-script
          configMap:
            name: k-comms-acceptance-script
        - name: local-ca
          configMap:
            name: k-comms-local-ca
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
