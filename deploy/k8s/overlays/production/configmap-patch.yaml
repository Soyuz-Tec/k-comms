apiVersion: v1
kind: ConfigMap
metadata:
  name: k-comms-config
data:
  PHX_HOST: comms.example.invalid
  PUBLIC_APP_URL: https://comms.example.invalid
  POOL_SIZE: "30"
  DATABASE_SSL: "true"
  DATABASE_SSL_CA_FILE: /etc/k-comms/database-ca/ca.crt
  # Provider composition must replace this with the DNS name covered by the
  # managed PostgreSQL certificate. IP literals are rejected at runtime.
  DATABASE_SSL_SERVER_NAME: postgres.example.invalid
  ALLOW_BOOTSTRAP: "false"
  ACCESS_TOKEN_TTL_SECONDS: "900"
  SESSION_TTL_SECONDS: "2592000"
  SESSION_ABSOLUTE_TTL_SECONDS: "2592000"
  CORS_ORIGINS: https://comms.example.invalid
  HSTS_ENABLED: "true"
  # Provider composition must set only the ingress-controller source ranges and
  # mirror them in k-comms-edge-ingress. Empty is the fail-closed neutral default.
  TRUSTED_PROXY_CIDRS: ""
  CSP_CONNECT_SOURCES: "'self' wss://comms.example.invalid https://comms.example.invalid https://objects.example.invalid wss://media.example.invalid"
  # These compatibility-named AUDIO_* settings govern audio and video calls.
  # Provider composition must replace this WSS origin and supply the matching
  # API credentials through k-comms-provider-secrets. The portable application
  # bundle deliberately does not deploy an in-cluster SFU.
  AUDIO_PROVIDER_MODE: livekit
  LIVEKIT_SERVER_URL: wss://media.example.invalid
  LIVEKIT_API_URL: https://media-api.example.invalid
  AUDIO_TOKEN_TTL_SECONDS: "300"
  # Repeat idempotent RemoveParticipant calls through at least this horizon so
  # a cached short-lived token cannot restore authority. Failures retry beyond it.
  AUDIO_PARTICIPANT_EVICTION_ENFORCEMENT_SECONDS: "660"
  S3_PUBLIC_ENDPOINT: https://objects.example.invalid
  S3_INTERNAL_SCHEME: https
  S3_INTERNAL_HOST: objects.example.invalid
  S3_INTERNAL_PORT: "443"
  S3_INTERNAL_ENDPOINT: https://objects.example.invalid
  S3_BUCKET: k-comms-production
  S3_REGION: us-east-1
  S3_URL_TTL_SECONDS: "300"
