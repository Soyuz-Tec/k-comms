apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: k-comms-production
resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml
  - auth-rate-limit-ingress.yaml
  - service-auth-rate-limit-ingress.yaml
  - socket-rate-limit-ingress.yaml
  - migration-job.yaml
  - worker-pod-disruption-budget.yaml
  - edge-horizontal-pod-autoscaler.yaml
  - worker-horizontal-pod-autoscaler.yaml
  - external-data-egress.yaml
patches:
  - path: configmap-patch.yaml
  - path: edge-ingress-policy-patch.yaml
  - path: edge-deployment-patch.yaml
  - path: worker-deployment-patch.yaml
  - path: edge-pod-disruption-budget-patch.yaml
images:
  - name: ghcr.io/soyuz-tec/k-comms
    newName: ghcr.io/soyuz-tec/k-comms
    # Promotion replaces this tag with an immutable digest in the retained
    # rendered bundle. Mutable tags are not applied directly to production.
    newTag: production-candidate
labels:
  - pairs:
      app.kubernetes.io/environment: production
    includeSelectors: false
    includeTemplates: true
