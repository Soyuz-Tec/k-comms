apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k-comms-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k-comms-worker
  minReplicas: 2
  maxReplicas: 12
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
    scaleUp:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
