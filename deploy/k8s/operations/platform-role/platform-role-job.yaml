apiVersion: batch/v1
kind: Job
metadata:
  name: k-comms-platform-role
  labels:
    app.kubernetes.io/name: k-comms
    app.kubernetes.io/part-of: k-comms
    app.kubernetes.io/component: one-shot-platform-role
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k-comms
        app.kubernetes.io/part-of: k-comms
        app.kubernetes.io/component: one-shot-platform-role
    spec:
      restartPolicy: Never
      serviceAccountName: k-comms
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform-role
          image: ghcr.io/soyuz-tec/k-comms:staging
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/k_comms"]
          args:
            - eval
            - >-
              CommsCore.Release.set_platform_role(
                System.fetch_env!("K_COMMS_PLATFORM_ROLE_USER_ID"),
                System.fetch_env!("K_COMMS_PLATFORM_ROLE"))
          envFrom:
            - configMapRef:
                name: k-comms-config
          env:
            - name: K_COMMS_ROLE
              value: worker
            - name: K_COMMS_RUNTIME_PURPOSE
              value: one_shot
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: k-comms-secrets, key: DATABASE_URL}
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef: {name: k-comms-secrets, key: SECRET_KEY_BASE}
            - name: PASSWORD_RECOVERY_SIGNING_KEY
              valueFrom:
                secretKeyRef: {name: k-comms-secrets, key: PASSWORD_RECOVERY_SIGNING_KEY}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: {name: k-comms-secrets, key: S3_ACCESS_KEY_ID}
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: k-comms-secrets, key: S3_SECRET_ACCESS_KEY}
            - name: K_COMMS_PLATFORM_ROLE_MANAGEMENT_SECRET
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: MANAGEMENT_SECRET}
            - name: K_COMMS_PLATFORM_ROLE_GRANT_TOKEN
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: MANAGEMENT_SECRET}
            - name: K_COMMS_PLATFORM_ROLE_USER_ID
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: USER_ID}
            - name: K_COMMS_PLATFORM_ROLE
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: ROLE}
            - name: K_COMMS_PLATFORM_ROLE_ACTOR
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: ACTOR}
            - name: K_COMMS_PLATFORM_ROLE_REASON
              valueFrom:
                secretKeyRef: {name: k-comms-platform-role-grant, key: REASON}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {sizeLimit: 64Mi}
