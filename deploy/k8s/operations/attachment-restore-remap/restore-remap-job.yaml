apiVersion: batch/v1
kind: Job
metadata:
  name: k-comms-attachment-restore-remap
  labels:
    app.kubernetes.io/name: k-comms
    app.kubernetes.io/part-of: k-comms
    app.kubernetes.io/component: one-shot-attachment-restore-remap
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k-comms
        app.kubernetes.io/part-of: k-comms
        app.kubernetes.io/component: one-shot-attachment-restore-remap
    spec:
      restartPolicy: Never
      serviceAccountName: k-comms
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: restore-remap
          image: ghcr.io/soyuz-tec/k-comms:staging
          imagePullPolicy: IfNotPresent
          command: ["/app/bin/k_comms"]
          args:
            - eval
            - CommsCore.Release.remap_restored_attachment_versions()
          envFrom:
            - configMapRef:
                name: k-comms-config
          env:
            - name: K_COMMS_ROLE
              value: worker
            - name: K_COMMS_RUNTIME_PURPOSE
              value: one_shot
            - name: K_COMMS_RESTORE_VERSION_REMAP
              value: remap-restored-attachment-versions
            - name: K_COMMS_RESTORE_OPERATION_ID
              valueFrom:
                secretKeyRef:
                  name: k-comms-restore-remap
                  key: OPERATION_ID
            - name: K_COMMS_RESTORE_ACTOR
              valueFrom:
                secretKeyRef:
                  name: k-comms-restore-remap
                  key: ACTOR
            - name: K_COMMS_RESTORE_REASON
              valueFrom:
                secretKeyRef:
                  name: k-comms-restore-remap
                  key: REASON
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: SECRET_KEY_BASE
            - name: PASSWORD_RECOVERY_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: PASSWORD_RECOVERY_SIGNING_KEY
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: k-comms-secrets
                  key: S3_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
