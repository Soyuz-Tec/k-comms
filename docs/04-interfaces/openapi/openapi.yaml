openapi: 3.1.0
info:
  title: K-Comms API
  version: 0.3.0
  description: Tenant-scoped communication, administration, governance, integrations, safety, and operations.
servers:
  - url: /
tags:
  - name: System
  - name: Sessions
  - name: Users
  - name: Conversations
  - name: Messages
  - name: Attachments
  - name: Administration
  - name: Governance
  - name: Integrations
  - name: Operations
  - name: Service API
paths:
  /health/live:
    get:
      tags: [System]
      operationId: live
      responses:
        '200':
          description: Process is live
  /health/ready:
    get:
      tags: [System]
      operationId: ready
      responses:
        '200':
          description: Required dependencies are ready
        '503':
          $ref: '#/components/responses/Error'
  /metrics:
    get:
      tags: [System]
      operationId: metrics
      security: [{metricsBearer: []}]
      responses:
        '200':
          description: Prometheus text exposition for internal scraping
          content:
            text/plain:
              schema: {type: string}
  /api/v1/status:
    get:
      tags: [System]
      operationId: status
      responses:
        '200':
          description: Service version and public capability availability
  /api/v1/bootstrap:
    post:
      tags: [Sessions]
      operationId: bootstrapTenant
      summary: Create a development workspace when bootstrap is enabled
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapRequest'
      responses:
        '201':
          description: Workspace and owner session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '403':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    post:
      tags: [Sessions]
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/refresh:
    post:
      tags: [Sessions]
      operationId: refreshSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [refresh_token]
              properties:
                refresh_token: {type: string, minLength: 40}
      responses:
        '200':
          description: Rotated session credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/password-recovery/requests:
    post:
      tags: [Sessions]
      operationId: requestPasswordRecovery
      summary: Queue password recovery without revealing whether the account exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRecoveryRequest'
      responses:
        '202':
          description: Request accepted for both known and unknown identities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordRecoveryAccepted'
        '429':
          $ref: '#/components/responses/Error'
  /api/v1/password-recovery/resets:
    post:
      tags: [Sessions]
      operationId: resetPasswordWithRecoveryToken
      summary: Consume a one-time recovery token and revoke existing access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordRecoveryReset'
      responses:
        '204': {description: Password changed; no session is created}
        '400': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
        '429': {$ref: '#/components/responses/Error'}
        '503': {$ref: '#/components/responses/Error'}
  /api/v1/sessions/current:
    delete:
      tags: [Sessions]
      operationId: revokeCurrentSession
      security: [{bearerAuth: []}]
      responses:
        '204': {description: Session revoked}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      security: [{bearerAuth: []}]
      responses:
        '200': {description: "Current tenant, user, and device"}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Tenant users}
  /api/v1/conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Conversations visible to the current user}
    post:
      tags: [Conversations]
      operationId: createConversation
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201': {description: Conversation created}
        '403': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/channels/discover:
    get:
      tags: [Conversations]
      operationId: discoverPublicChannels
      summary: Discover non-archived tenant-visible channels in the current tenant
      security: [{bearerAuth: []}]
      parameters:
        - name: q
          in: query
          schema: {type: string, maxLength: 160}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 25}
        - name: cursor
          in: query
          description: Opaque continuation cursor returned by the previous page
          schema: {type: string}
      responses:
        '200':
          description: Tenant-scoped public-channel discovery page with current membership state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PublicChannelDiscoveryPage'}
        '403': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/channels/{channelId}/join:
    parameters:
      - $ref: '#/components/parameters/ChannelId'
    post:
      tags: [Conversations]
      operationId: joinPublicChannel
      summary: Idempotently join a tenant-visible channel as the current user
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Existing active membership returned without another event
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PublicChannelMembershipResponse'}
        '201':
          description: Membership created or reactivated atomically
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PublicChannelMembershipResponse'}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/channels/{channelId}/membership:
    parameters:
      - $ref: '#/components/parameters/ChannelId'
    delete:
      tags: [Conversations]
      operationId: leavePublicChannel
      summary: Leave a tenant-visible channel as the current user
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [version]
              properties:
                version: {type: integer, minimum: 1}
      responses:
        '200':
          description: Versioned membership is inactive; repeated deletes are replay-safe
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PublicChannelMembershipResponse'}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '428': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Conversations]
      operationId: getConversation
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Conversation visible to the current user}
        '404': {$ref: '#/components/responses/Error'}
    patch:
      tags: [Conversations]
      operationId: updateConversation
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateConversationRequest'}
      responses:
        '200': {description: Versioned conversation settings updated}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
        '428': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/members:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Conversations]
      operationId: listConversationMembers
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Active conversation members}
    post:
      tags: [Conversations]
      operationId: addConversationMember
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [user_id]
              properties:
                user_id: {type: string, format: uuid}
                role: {enum: [member, moderator, owner], default: member}
      responses:
        '201': {description: Member added}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/members/{userId}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
      - name: userId
        in: path
        required: true
        schema: {type: string, format: uuid}
    patch:
      tags: [Conversations]
      operationId: updateConversationMemberRole
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateConversationMemberRequest'}
      responses:
        '200': {description: Versioned membership role updated}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
        '428': {$ref: '#/components/responses/Error'}
    delete:
      tags: [Conversations]
      operationId: removeConversationMember
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/VersionRequest'}
      responses:
        '204': {description: Member removed}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '428': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/messages:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [Messages]
      operationId: listMessages
      security: [{bearerAuth: []}]
      parameters:
        - name: after_sequence
          in: query
          schema: {type: integer, minimum: 0, default: 0}
        - name: before_sequence
          in: query
          schema: {type: integer, minimum: 1}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 200, default: 100}
      responses:
        '200':
          description: Ordered durable message page with an explicit continuation state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagePage'
        '403': {$ref: '#/components/responses/Error'}
    post:
      tags: [Messages]
      operationId: createMessage
      security: [{bearerAuth: []}]
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: {type: string, minLength: 8, maxLength: 128}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201': {description: Canonical committed message}
        '403': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/read-cursor:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    put:
      tags: [Messages]
      operationId: updateReadCursor
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [sequence]
              properties:
                sequence: {type: integer, minimum: 0}
      responses:
        '200': {description: Stored monotonic read cursor}
  /api/v1/conversations/{conversationId}/messages/{messageId}/thread:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
      - $ref: '#/components/parameters/MessageId'
    get:
      tags: [Messages]
      operationId: getMessageThread
      security: [{bearerAuth: []}]
      parameters:
        - name: before_sequence
          in: query
          schema: {type: integer, minimum: 1}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 50}
      responses:
        '200':
          description: Canonical thread root and ascending bounded reply page
          content:
            application/json:
              schema: {$ref: '#/components/schemas/MessageThreadResponse'}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/messages/{messageId}:
    parameters:
      - $ref: '#/components/parameters/MessageId'
    patch:
      tags: [Messages]
      operationId: editMessage
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body: {type: string, minLength: 1, maxLength: 65535}
      responses:
        '200': {description: Edited message}
        '403': {$ref: '#/components/responses/Error'}
    delete:
      tags: [Messages]
      operationId: deleteMessage
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Message tombstone}
        '403': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/messages/{messageId}/reactions:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
      - $ref: '#/components/parameters/MessageId'
    post:
      tags: [Messages]
      operationId: addReaction
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [emoji]
              properties:
                emoji: {type: string, minLength: 1, maxLength: 32}
      responses:
        '201': {description: Reaction added idempotently}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/conversations/{conversationId}/messages/{messageId}/reactions/{emoji}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
      - $ref: '#/components/parameters/MessageId'
      - name: emoji
        in: path
        required: true
        schema: {type: string, minLength: 1, maxLength: 32}
    delete:
      tags: [Messages]
      operationId: removeReaction
      security: [{bearerAuth: []}]
      responses:
        '204': {description: Reaction removed idempotently}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/search:
    get:
      tags: [Messages]
      operationId: searchMessages
      security: [{bearerAuth: []}]
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string, minLength: 1}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 200, default: 50}
      responses:
        '200': {description: Membership-filtered message matches}
  /api/v1/attachments:
    post:
      tags: [Attachments]
      operationId: createAttachmentIntent
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachmentIntentRequest'
      responses:
        '201':
          description: Attachment metadata and signed upload intent
          content:
            application/json:
              schema:
                type: object
                required: [data, upload]
                properties:
                  data: {type: object}
                  upload: {$ref: '#/components/schemas/PresignDescriptor'}
  /api/v1/attachments/{attachmentId}/complete:
    parameters:
      - $ref: '#/components/parameters/AttachmentId'
    post:
      tags: [Attachments]
      operationId: completeAttachment
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Object verified and attachment marked ready}
        '409': {$ref: '#/components/responses/Error'}
  /api/v1/attachments/{attachmentId}:
    parameters:
      - $ref: '#/components/parameters/AttachmentId'
    get:
      tags: [Attachments]
      operationId: getAttachment
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Authorized attachment and optional signed download intent
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: {type: object}
                  download: {$ref: '#/components/schemas/PresignDescriptor'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/invitations/accept:
    post:
      tags: [Sessions]
      operationId: acceptInvitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, display_name, password]
              properties:
                token: {type: string}
                display_name: {type: string, minLength: 1, maxLength: 120}
                password: {type: string, minLength: 12, maxLength: 256}
      responses:
        '201': {description: Invitation accepted and session created}
        '401': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/socket-tickets:
    post:
      tags: [Sessions]
      operationId: createSocketTicket
      security: [{bearerAuth: []}]
      responses:
        '201':
          description: Short-lived one-time WebSocket handshake ticket
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [ticket, expires_in]
                    properties:
                      ticket: {type: string, minLength: 40}
                      expires_in: {type: integer, minimum: 10, maximum: 120}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/me/step-up:
    post:
      tags: [Sessions]
      operationId: stepUpSession
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                current_password: {type: string}
      responses:
        '200': {description: Session elevated for a bounded sensitive-operation window}
        '401': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}

  /api/v1/me/profile:
    patch:
      tags: [Users]
      operationId: updateCurrentProfile
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateProfileRequest'}
      responses:
        '200': {description: Updated profile}
        '401': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/me/password:
    put:
      tags: [Users]
      operationId: changeCurrentPassword
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ChangePasswordRequest'}
      responses:
        '204': {description: Password changed and other sessions revoked}
        '401': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/me/devices:
    get:
      tags: [Users]
      operationId: listCurrentDevices
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Current user devices}
  /api/v1/me/devices/{deviceId}:
    parameters:
      - {name: deviceId, in: path, required: true, schema: {type: string, format: uuid}}
    delete:
      tags: [Users]
      operationId: revokeCurrentDevice
      security: [{bearerAuth: []}]
      responses:
        '204': {description: Device and its sessions revoked}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/me/sessions:
    get:
      tags: [Users]
      operationId: listCurrentSessions
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Current user sessions}
  /api/v1/me/sessions/{sessionId}:
    parameters:
      - {name: sessionId, in: path, required: true, schema: {type: string, format: uuid}}
    delete:
      tags: [Users]
      operationId: revokeSession
      security: [{bearerAuth: []}]
      responses:
        '204': {description: Session revoked}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/notification-preferences:
    get:
      tags: [Users]
      operationId: getNotificationPreferences
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Current user notification preferences}
    put:
      tags: [Users]
      operationId: updateNotificationPreferences
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/NotificationPreferences'}
      responses:
        '200': {description: Updated notification preferences}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/me/push-subscriptions/config:
    get:
      tags: [Users]
      operationId: getPushSubscriptionConfig
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Current browser Web Push registration configuration
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PushSubscriptionConfigResponse'}
        '401': {$ref: '#/components/responses/Error'}
  /api/v1/me/push-subscriptions:
    get:
      tags: [Users]
      operationId: listPushSubscriptions
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Redacted push subscriptions for the authenticated device
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PushSubscriptionListResponse'}
        '401': {$ref: '#/components/responses/Error'}
    post:
      tags: [Users]
      operationId: registerPushSubscription
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PushSubscriptionRegistrationRequest'}
      responses:
        '200':
          description: Idempotently replayed registration for this device
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PushSubscriptionRegistrationResponse'}
        '201':
          description: Encrypted push subscription registered for this device
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PushSubscriptionRegistrationResponse'}
        '401': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
        '503': {$ref: '#/components/responses/Error'}
  /api/v1/me/push-subscriptions/{subscriptionId}:
    parameters:
      - {name: subscriptionId, in: path, required: true, schema: {type: string, format: uuid}}
    delete:
      tags: [Users]
      operationId: revokePushSubscription
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Push subscription revoked for the authenticated device
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PushSubscriptionResponse'}
        '401': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
  /api/v1/notifications:
    get:
      tags: [Integrations]
      operationId: listNotifications
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Authorized durable notification intents}
  /api/v1/in-app-notifications:
    get:
      tags: [Users]
      operationId: listInAppNotifications
      security: [{bearerAuth: []}]
      parameters:
        - name: limit
          in: query
