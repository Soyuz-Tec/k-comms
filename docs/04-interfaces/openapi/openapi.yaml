        '422': {$ref: '#/components/responses/Error'}
  /api/v1/ops:
    get:
      tags: [Operations]
      operationId: getOperationsSnapshot
      security: [{bearerAuth: []}]
      responses:
        '200': {description: Content-free tenant operations snapshot and provider state}
  /api/v1/ops/retry:
    post:
      tags: [Operations]
      operationId: retryOperationalResource
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RetryOperationalResourceRequest'}
      responses:
        '202': {description: Retry accepted}
        '403': {$ref: '#/components/responses/Error'}
        '404': {$ref: '#/components/responses/Error'}
        '409': {$ref: '#/components/responses/Error'}
        '422': {$ref: '#/components/responses/Error'}
  /api/v1/platform/ops:
    get:
      tags: [Operations]
      operationId: getPlatformOperationsSnapshot
      security: [{bearerAuth: []}]
      responses:
        '200': {description: "Content-free global health snapshot for platform, support, and security operators"}
        '403': {$ref: '#/components/responses/Error'}

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: K-Comms signed access token
    metricsBearer:
      type: http
      scheme: bearer
      bearerFormat: Dedicated metrics scraper token
    serviceAccountAuth:
      type: http
      scheme: bearer
      bearerFormat: kcsa_<uuid>.<one-time-secret>
      description: Dedicated service credential; never accepted on human, admin, platform, refresh, or WebSocket routes.
  parameters:
    ChannelId:
      name: channelId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: {type: string, format: uuid}
    MessageId:
      name: messageId
      in: path
      required: true
      schema: {type: string, format: uuid}
    AttachmentId:
      name: attachmentId
      in: path
      required: true
      schema: {type: string, format: uuid}
    OptionalIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional replay key; a successful replay returns the existing resource and never reissues a one-time secret.
      schema: {type: string, minLength: 1, maxLength: 200}
  responses:
    Error:
      description: Structured request failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, detail]
          properties:
            code: {type: string}
            detail: {type: string}
            meta: {}
    BootstrapRequest:
      type: object
      additionalProperties: false
      required: [tenant_name, tenant_slug, display_name, email, password]
      properties:
        tenant_name: {type: string, minLength: 2, maxLength: 120}
        tenant_slug: {type: string, minLength: 2, maxLength: 80}
        display_name: {type: string, minLength: 1, maxLength: 120}
        email: {type: string, format: email}
        password: {type: string, minLength: 12, maxLength: 256}
        device_name: {type: string, maxLength: 120}
        device_platform: {type: string, maxLength: 40}
    LoginRequest:
      type: object
      additionalProperties: false
      required: [tenant_slug, email, password]
      properties:
        tenant_slug: {type: string}
        email: {type: string, format: email}
        password: {type: string}
        device:
          type: object
          properties:
            id: {type: string, format: uuid}
            name: {type: string}
            platform: {type: string}
    PasswordRecoveryRequest:
      type: object
      additionalProperties: false
      required: [tenant_slug, email]
      properties:
        tenant_slug: {type: string, minLength: 1, maxLength: 80}
        email: {type: string, format: email, maxLength: 320}
    PasswordRecoveryAccepted:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [status]
          properties:
            status: {const: accepted}
    PasswordRecoveryReset:
      type: object
      additionalProperties: false
      required: [token, new_password]
      properties:
        token: {type: string, minLength: 40, maxLength: 512}
        new_password: {type: string, minLength: 12, maxLength: 256}
    UpdateProfileRequest:
      type: object
      additionalProperties: false
      properties:
        display_name: {type: string, minLength: 1, maxLength: 120}
        email: {type: string, format: email}
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required: [current_password, new_password]
      properties:
        current_password: {type: string}
        new_password: {type: string, minLength: 12, maxLength: 256}
    VersionRequest:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        version: {type: integer, minimum: 1}
    ReasonRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason: {type: string, minLength: 3, maxLength: 1000}
    UpdateAdminUserRequest:
      type: object
      additionalProperties: false
      required: [version, reason]
      properties:
        role: {enum: [member, moderator, admin, compliance_admin, security_admin, owner]}
        status: {enum: [active, suspended, deleted]}
        display_name: {type: string, minLength: 1, maxLength: 120}
        version: {type: integer, minimum: 1}
        reason: {type: string, minLength: 3, maxLength: 1000}
    CreateInvitationRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: {type: string, format: email}
        role: {enum: [member, moderator, admin, compliance_admin, security_admin], default: member}
    CreateModerationCaseRequest:
      type: object
      additionalProperties: false
      required: [category, summary]
      anyOf:
        - required: [subject_user_id]
        - required: [conversation_id]
        - required: [message_id]
      properties:
        subject_user_id: {type: string, format: uuid}
        conversation_id: {type: string, format: uuid}
        message_id: {type: string, format: uuid}
        category: {type: string, minLength: 2, maxLength: 80}
        summary: {type: string, minLength: 3, maxLength: 240}
        details: {type: string, maxLength: 10000}
        priority: {enum: [low, normal, high, urgent], default: normal}
    CreateModerationActionRequest:
      type: object
      additionalProperties: false
      required: [action_type, version]
      allOf:
        - if:
            properties:
              action_type: {const: assign}
            required: [action_type]
          then:
            required: [assigned_to_user_id]
      properties:
        action_type: {enum: [note, assign, start_review, resolve, dismiss, reopen]}
        assigned_to_user_id: {type: string, format: uuid}
        note: {type: string, maxLength: 4000}
        version: {type: integer, minimum: 1}
    CreateRetentionPolicyRequest:
      type: object
      additionalProperties: false
      required: [name, retention_days]
      allOf:
        - if:
            required: [conversation_id]
          then:
            required: [scope_type]
            properties:
              scope_type: {const: conversation}
        - if:
            required: [scope_type]
            properties:
              scope_type: {const: conversation}
          then:
            required: [conversation_id]
      properties:
        name: {type: string, minLength: 2, maxLength: 120}
        scope_type: {enum: [tenant, conversation], default: tenant}
        conversation_id: {type: string, format: uuid}
        retention_days: {type: integer, minimum: 1, maximum: 36500}
        delete_attachments: {type: boolean, default: true}
        status: {enum: [active, disabled], default: active}
    UpdateRetentionPolicyRequest:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        name: {type: string, minLength: 2, maxLength: 120}
        scope_type: {enum: [tenant, conversation]}
        conversation_id: {type: [string, 'null'], format: uuid}
        retention_days: {type: integer, minimum: 1, maximum: 36500}
        delete_attachments: {type: boolean}
        status: {enum: [active, disabled]}
        version: {type: integer, minimum: 1}
    CreateLegalHoldRequest:
      type: object
      additionalProperties: false
      required: [name, reason, scope_type]
      oneOf:
        - properties:
            scope_type: {const: tenant}
          not:
            anyOf:
              - required: [subject_user_id]
              - required: [conversation_id]
        - required: [subject_user_id]
          properties:
            scope_type: {const: user}
          not:
            required: [conversation_id]
        - required: [conversation_id]
          properties:
            scope_type: {const: conversation}
          not:
            required: [subject_user_id]
      properties:
        name: {type: string, minLength: 2, maxLength: 160}
        reason: {type: string, minLength: 3, maxLength: 4000}
        scope_type: {enum: [tenant, user, conversation]}
        subject_user_id: {type: string, format: uuid}
        conversation_id: {type: string, format: uuid}
    ReleaseLegalHoldRequest:
      type: object
      additionalProperties: false
      required: [version, release_reason]
      properties:
        version: {type: integer, minimum: 1}
        release_reason: {type: string, minLength: 3, maxLength: 1000}
    CreateDeletionRequest:
      type: object
      additionalProperties: false
      required: [target_type, reason]
      oneOf:
        - required: [subject_user_id]
          properties:
            target_type: {const: user}
          not:
            anyOf:
              - required: [conversation_id]
              - required: [message_id]
        - required: [conversation_id]
          properties:
            target_type: {const: conversation}
          not:
            anyOf:
              - required: [subject_user_id]
              - required: [message_id]
        - required: [message_id]
          properties:
            target_type: {const: message}
          not:
            anyOf:
              - required: [subject_user_id]
              - required: [conversation_id]
      properties:
        target_type: {enum: [user, conversation, message]}
        subject_user_id: {type: string, format: uuid}
        conversation_id: {type: string, format: uuid}
        message_id: {type: string, format: uuid}
        reason: {type: string, minLength: 3, maxLength: 4000}
        scheduled_for: {type: string, format: date-time}
    TransitionDeletionRequest:
      type: object
      additionalProperties: false
      required: [status, version, transition_reason]
      properties:
        status: {enum: [approved, rejected, cancelled]}
        version: {type: integer, minimum: 1}
        transition_reason: {type: string, minLength: 3, maxLength: 1000}
        scheduled_for: {type: string, format: date-time}
    CreateWebhookEndpointRequest:
      type: object
      additionalProperties: false
      required: [name, url, event_types]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        url: {type: string, format: uri, pattern: '^https://', maxLength: 2048}
        event_types:
          type: array
          minItems: 1
          maxItems: 50
          items: {type: string, pattern: '^[a-z][a-z0-9_.-]{2,119}$'}
    UpdateWebhookEndpointRequest:
      type: object
      additionalProperties: false
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        url: {type: string, format: uri, pattern: '^https://', maxLength: 2048}
        status: {enum: [active, disabled]}
        event_types:
          type: array
          minItems: 1
          maxItems: 50
          items: {type: string, pattern: '^[a-z][a-z0-9_.-]{2,119}$'}
    RetryOperationalResourceRequest:
      type: object
      additionalProperties: false
      required: [resource_type, id]
      properties:
        resource_type: {enum: [notification, webhook, attachment_scan]}
        id: {type: string, format: uuid}
    TenantSettings:
      type: object
      additionalProperties: false
      required: [tenant_id, allow_public_channels, message_edit_window_seconds, max_attachment_bytes, default_retention_days, max_active_users, max_active_conversations, max_conversation_members, version]
      properties:
        tenant_id: {type: string, format: uuid}
        allow_public_channels: {type: boolean}
        message_edit_window_seconds: {type: integer, minimum: 0}
        max_attachment_bytes: {type: integer, minimum: 1, maximum: 1073741824}
        default_retention_days: {type: [integer, 'null'], minimum: 1, maximum: 36500}
        max_active_users: {type: integer, minimum: 1, maximum: 1000000, default: 500}
        max_active_conversations: {type: integer, minimum: 1, maximum: 10000000, default: 2000}
        max_conversation_members: {type: integer, minimum: 2, maximum: 100000, default: 250}
        version: {type: integer, minimum: 1}
    TenantQuotaFlags:
      type: object
      additionalProperties: false
      required: [active_users, active_conversations, conversation_members, any]
      properties:
        active_users: {type: boolean}
        active_conversations: {type: boolean}
        conversation_members: {type: boolean}
        any: {type: boolean}
    TenantQuotaUsage:
      type: object
      additionalProperties: false
      required: [active_users, active_conversations, largest_conversation_members, limits, at_capacity, over_limit]
      properties:
        active_users: {type: integer, minimum: 0}
        active_conversations: {type: integer, minimum: 0}
        largest_conversation_members: {type: integer, minimum: 0}
        limits:
          type: object
          additionalProperties: false
          required: [max_active_users, max_active_conversations, max_conversation_members]
          properties:
            max_active_users: {type: integer, minimum: 1, maximum: 1000000}
            max_active_conversations: {type: integer, minimum: 1, maximum: 10000000}
            max_conversation_members: {type: integer, minimum: 2, maximum: 100000}
        at_capacity: {$ref: '#/components/schemas/TenantQuotaFlags'}
        over_limit: {$ref: '#/components/schemas/TenantQuotaFlags'}
    TenantAdministrationResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [tenant, settings, usage]
          properties:
            tenant:
              type: object
              additionalProperties: false
              required: [id, name, slug, status]
              properties:
                id: {type: string, format: uuid}
                name: {type: string, minLength: 1, maxLength: 120}
                slug: {type: string}
                status: {enum: [active, suspended, deleting]}
            settings: {$ref: '#/components/schemas/TenantSettings'}
            usage: {$ref: '#/components/schemas/TenantQuotaUsage'}
    UpdateTenantSettingsRequest:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        name: {type: string, minLength: 1, maxLength: 120}
        allow_public_channels: {type: boolean}
        message_edit_window_seconds: {type: integer, minimum: 0, maximum: 2592000}
        max_attachment_bytes: {type: integer, minimum: 1, maximum: 1073741824}
        default_retention_days: {type: [integer, 'null'], minimum: 1, maximum: 36500}
        max_active_users: {type: integer, minimum: 1, maximum: 1000000}
        max_active_conversations: {type: integer, minimum: 1, maximum: 10000000}
        max_conversation_members: {type: integer, minimum: 2, maximum: 100000}
        version: {type: integer, minimum: 1}
    ServiceAccountScope:
      type: string
      enum: [conversations:read, messages:read, messages:write, search:read]
    AuditExportRequest:
      type: object
      additionalProperties: false
      properties:
        q: {type: string, maxLength: 200}
        action: {type: string, maxLength: 200}
        resource_type: {type: string, maxLength: 200}
        actor_user_id: {type: string, format: uuid}
        request_id: {type: string, maxLength: 200}
        after: {type: string, format: date-time}
        before: {type: string, format: date-time}
        limit: {type: integer, minimum: 1, maximum: 5000, default: 1000}
    ServiceAccount:
      type: object
      additionalProperties: false
      required: [id, tenant_id, user_id, device_id, name, credential_prefix, secret_hint, scopes, status, expires_at, last_rotated_at, version, inserted_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        user_id: {type: string, format: uuid}
        device_id: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 120}
        credential_prefix: {type: string, pattern: '^kcsa_[0-9a-fA-F-]{36}$'}
        secret_hint: {type: string, minLength: 4, maxLength: 4}
        scopes:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items: {$ref: '#/components/schemas/ServiceAccountScope'}
        status: {enum: [active, revoked, expired]}
        expires_at: {type: string, format: date-time}
        last_used_at: {type: [string, 'null'], format: date-time}
        last_rotated_at: {type: string, format: date-time}
        revoked_at: {type: [string, 'null'], format: date-time}
        version: {type: integer, minimum: 1}
        inserted_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    CreateServiceAccountRequest:
      type: object
      additionalProperties: false
      required: [name, scopes, reason]
      properties:
        name: {type: string, minLength: 2, maxLength: 120}
        scopes:
          type: array
          minItems: 1
          maxItems: 4
          uniqueItems: true
          items: {$ref: '#/components/schemas/ServiceAccountScope'}
        expires_at:
          type: string
          format: date-time
          description: Defaults to 90 days and cannot exceed one year from creation.
        reason: {type: string, minLength: 3, maxLength: 1000}
    VersionedReasonRequest:
      type: object
      additionalProperties: false
      required: [version, reason]
      properties:
        version: {type: integer, minimum: 1}
        reason: {type: string, minLength: 3, maxLength: 1000}
    ServiceAccountResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data: {$ref: '#/components/schemas/ServiceAccount'}
    ServiceAccountCredentialResponse:
      allOf:
        - {$ref: '#/components/schemas/ServiceAccountResponse'}
        - type: object
          required: [credential]
          properties:
            credential:
              type: string
              pattern: '^kcsa_[0-9a-fA-F-]{36}\.[A-Za-z0-9_-]{32,}$'
              description: One-time value returned only by create or rotate.
    ServiceAccountListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/ServiceAccount'}
    ServiceSendMessageRequest:
      type: object
      additionalProperties: false
      required: [body]
      properties:
        body: {type: string, minLength: 1, maxLength: 65535}
        reply_to_message_id: {type: [string, 'null'], format: uuid}
        metadata: {type: object, maxProperties: 32}
    ServiceConversationListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/Conversation'}
    ServiceSearchResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/Message'}
    CreateConversationRequest:
      type: object
      additionalProperties: false
      required: [kind, member_ids]
      properties:
        title: {type: [string, 'null'], maxLength: 160}
        kind: {enum: [direct, group, channel]}
        visibility: {enum: [private, tenant], default: private}
        member_ids:
          type: array
          uniqueItems: true
          items: {type: string, format: uuid}
    Conversation:
      type: object
      required: [id, tenant_id, kind, visibility, latest_sequence, archived_at, version, inserted_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        kind: {enum: [direct, group, channel]}
        title: {type: [string, 'null'], maxLength: 160}
        visibility: {enum: [private, tenant]}
        latest_sequence: {type: integer, minimum: 0}
        archived_at: {type: [string, 'null'], format: date-time}
        version: {type: integer, minimum: 1}
        inserted_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    MembershipSummary:
      type: object
      additionalProperties: false
      required: [id, role, joined_at, left_at, last_read_sequence, version]
      properties:
        id: {type: string, format: uuid}
        role: {enum: [member, moderator, owner]}
        joined_at: {type: string, format: date-time}
        left_at: {type: [string, 'null'], format: date-time}
        last_read_sequence: {type: integer, minimum: 0}
        version: {type: integer, minimum: 1}
    PublicChannel:
      allOf:
        - $ref: '#/components/schemas/Conversation'
        - type: object
          required: [joined, member_count, membership]
          properties:
            joined: {type: boolean}
            member_count: {type: integer, minimum: 1}
            membership:
              anyOf:
                - $ref: '#/components/schemas/MembershipSummary'
                - type: 'null'
    PublicChannelDiscoveryPage:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/PublicChannel'}
        page:
          type: object
          additionalProperties: false
          required: [limit, has_more, next_cursor]
          properties:
            limit: {type: integer, minimum: 1, maximum: 100}
            has_more: {type: boolean}
            next_cursor: {type: [string, 'null']}
    PublicChannelMembershipResponse:
      type: object
      additionalProperties: false
      required: [data, replayed]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [conversation, membership]
          properties:
            conversation: {$ref: '#/components/schemas/Conversation'}
            membership: {$ref: '#/components/schemas/MembershipSummary'}
        replayed: {type: boolean}
    SendMessageRequest:
      type: object
      additionalProperties: false
      required: [body]
      properties:
        body: {type: string, minLength: 1, maxLength: 65535}
        reply_to_message_id: {type: [string, 'null'], format: uuid}
        mentioned_user_ids:
          type: array
          maxItems: 50
          uniqueItems: true
          items: {type: string, format: uuid}
        attachment_ids:
          type: array
          maxItems: 20
          uniqueItems: true
          items: {type: string, format: uuid}
        metadata: {type: object, maxProperties: 32}
    Message:
      type: object
      additionalProperties: false
      required: [id, tenant_id, conversation_id, conversation_sequence, sender_user_id, sender_device_id, client_message_id, reply_to_message_id, thread_root_message_id, thread_reply_count, mentioned_user_ids, body, metadata, status, edited_at, deleted_at, inserted_at, attachments, reactions]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        conversation_id: {type: string, format: uuid}
        conversation_sequence: {type: integer, minimum: 1}
        sender_user_id: {type: string, format: uuid}
        sender_device_id: {type: string, format: uuid}
        client_message_id: {type: string}
        reply_to_message_id: {type: [string, 'null'], format: uuid}
        thread_root_message_id: {type: [string, 'null'], format: uuid}
        thread_reply_count: {type: integer, minimum: 0}
        mentioned_user_ids:
          type: array
          maxItems: 50
          uniqueItems: true
          items: {type: string, format: uuid}
        body: {type: [string, 'null']}
        metadata: {type: object}
        status: {enum: [active, deleted, moderated]}
        edited_at: {type: [string, 'null'], format: date-time}
        deleted_at: {type: [string, 'null'], format: date-time}
        inserted_at: {type: string, format: date-time}
        attachments: {type: array, items: {type: object}}
        reactions: {type: array, items: {type: object}}
    MessagePage:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/Message'}
        page:
          type: object
          required: [has_more, reset_required]
          properties:
            has_more: {type: boolean}
            next_after_sequence: {type: [integer, 'null']}
            reset_required: {type: boolean}
    MessageThreadResponse:
      type: object
      additionalProperties: false
      required: [data, page]
      properties:
        data:
          type: object
          additionalProperties: false
          required: [root, replies, reply_count]
          properties:
            root: {$ref: '#/components/schemas/Message'}
            replies:
              type: array
              items: {$ref: '#/components/schemas/Message'}
            reply_count: {type: integer, minimum: 0}
        page:
          type: object
          additionalProperties: false
          required: [has_more, next_before_sequence]
          properties:
