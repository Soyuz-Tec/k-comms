dependency_graphs:
  compiled:
    source: Production CommsCore module references after canonical-schema and exact-module ownership attribution.
    edge_direction: referencing_owner_to_referenced_owner
    includes: Contexts whose graph_scope is included or omitted; included is the default.
    excludes: Contexts whose graph_scope is excluded remain ownership, schema-access, write, and adapter enforcement subjects but do not add compiled graph edges.
    cycle_policy: A cycle is a violation unless every retained cycle fingerprint has one exact ADR-backed temporary-violation declaration.
  runtime:
    source: runtime_collaborations
    edge_direction: consumer_to_provider
    includes: Exact declared consumer, provider, port, caller, operation, binding, result contract, and transaction semantics.
    cycle_policy: Runtime cycles are forbidden unless an exact ADR-backed temporary violation states the invariant and removal condition.
  combined:
    source: Union of compiled and runtime edges.
    edge_direction: preserve_source_graph_direction
    includes: All included compiled owners and all declared runtime collaborations.
    cycle_policy: Combined cycles are always reported. A cycle produced solely by an exact validated dependency-inversion collaboration is accepted graph topology; every other combined cycle must be removed or represented by a compiled-cycle or runtime-cycle violation.

namespace_dependency_rules:
  - id: attachments-do-not-depend-on-messaging
    from: CommsCore.Attachments
    forbidden: [CommsCore.Messaging]
    condition: Messaging orchestrates transactional attachment claiming by IDs; Attachments must not import message schemas or implementation modules.
  - id: service-accounts-do-not-depend-on-conversation-content
    from: CommsCore.ServiceAccounts
    forbidden: [CommsCore.Messaging, CommsCore.Attachments]
    condition: ConversationContent owns service message reads, writes, search, and attachment policy; ServiceAccounts supplies only identity and scoped capability validation.
  - id: accounts-do-not-depend-on-conversations
    from: CommsCore.Accounts
    forbidden: [CommsCore.Conversations]
    condition: IdentityAccess composes the initial channel through its transaction-scoped bootstrap port; Accounts must not import Conversations facades, contracts, schemas, or implementation modules.
  - id: service-accounts-do-not-depend-on-conversations
    from: CommsCore.ServiceAccounts
    forbidden: [CommsCore.Conversations]
    condition: Conversations owns service directory and membership policy; ServiceAccounts validates only the durable service identity and requested capability.
  - id: invitations-do-not-depend-on-accounts
    from: CommsCore.Administration.Invitations
    forbidden: [CommsCore.Accounts]
    condition: TenantAdministration invokes IdentityAccess only through its exact configured ports; Invitations must not import the Accounts facade, contracts, schemas, or implementation modules.

runtime_collaborations:
  - id: identity-initial-conversation-bootstrap
    consumer: identity_access
    provider: conversations
    port: CommsCore.Accounts.ConversationBootstrapPort
    result_contract: CommsCore.Accounts.InitialConversationReceipt
    implementation: CommsCore.Conversations
    callers: [CommsCore.Accounts]
    operations:
      - {name: create_initial_channel, arity: 1}
      - {name: fetch_initial_channel, arity: 2}
    binding:
      application: comms_core
      key: identity_conversation_bootstrap_adapter
      module: CommsCore.Conversations
    transaction: required
    graph_semantics:
      control_flow: identity_access_to_conversations
      compile_dependency: conversations_to_identity_access
      static_cycle_policy: dependency_inversion
    condition: IdentityAccess owns the narrow bootstrap command/result contract while Conversations implements and persists its owner contribution on the caller transaction; this reviewed runtime collaboration is reported separately from compiled context edges and may not grow beyond the declared operations or caller.
  - id: identity-notification-lifecycle
    consumer: identity_access
    provider: notification_delivery
    port: CommsCore.Accounts.NotificationPort
    result_contract: CommsCore.Accounts.NotificationReceipt
    implementation: CommsCore.Notifications
    callers: [CommsCore.Accounts, CommsCore.PasswordRecovery]
    operations:
      - {name: execute, arity: 1}
    binding:
      application: comms_core
      key: identity_notification_adapter
      module: CommsCore.Notifications
    transaction: required
    graph_semantics:
      control_flow: identity_access_to_notification_delivery
      compile_dependency: notification_delivery_to_identity_access
      static_cycle_policy: dependency_inversion
    condition: IdentityAccess owns the recovery and access-revocation command/result contract while NotificationDelivery implements the contribution on the caller transaction; this reviewed collaboration may not acquire new callers, operations, or bindings without architecture review.
  - id: tenant-identity-access
    consumer: tenant_administration
    provider: identity_access
    port: CommsCore.Administration.IdentityAccessPort
    result_contract: CommsCore.Administration.IdentityGrant
    implementation: CommsCore.Accounts
    callers: [CommsCore.Administration]
    operations:
      - {name: resolve_access, arity: 1}
    binding:
      application: comms_core
      key: tenant_identity_access_adapter
      module: CommsCore.Accounts
    transaction: independent
    graph_semantics:
      control_flow: tenant_administration_to_identity_access
      compile_dependency: identity_access_to_tenant_administration
      static_cycle_policy: dependency_inversion
    condition: TenantAdministration owns the bounded access-grant query contract while IdentityAccess verifies canonical user, tenant, device, and session state; callers may not bypass this exact query port.
  - id: tenant-authorization-actor
    consumer: tenant_administration
    provider: identity_access
    port: CommsCore.Administration.AuthorizationActorPort
    result_contract: CommsCore.Administration.AuthorizationActor
    implementation: CommsCore.Accounts
    callers: [CommsCore.Administration]
    operations:
      - {name: resolve_authorization_actor, arity: 1}
    binding:
      application: comms_core
      key: tenant_authorization_actor_adapter
      module: CommsCore.Accounts
    transaction: independent
    graph_semantics:
      control_flow: tenant_administration_to_identity_access
      compile_dependency: identity_access_to_tenant_administration
      static_cycle_policy: dependency_inversion
    condition: TenantAdministration owns the exact authorization-attribution DTO while IdentityAccess verifies the claimed tenant and user; the request correlation id must match the caller subject exactly.
  - id: tenant-invitation-identity
    consumer: tenant_administration
    provider: identity_access
    port: CommsCore.Administration.InvitationIdentityPort
    result_contract: CommsCore.Administration.InvitedIdentityReceipt
    implementation: CommsCore.Accounts
    callers: [CommsCore.Administration.Invitations]
    operations:
      - {name: authorize_invitation, arity: 1}
      - {name: validate_invitation_password, arity: 1}
      - {name: ensure_invitation_identity_available, arity: 2}
      - {name: enroll_invited_user, arity: 1}
    binding:
      application: comms_core
      key: tenant_invitation_identity_adapter
      module: CommsCore.Accounts
    transaction: required
    graph_semantics:
      control_flow: tenant_administration_to_identity_access
      compile_dependency: identity_access_to_tenant_administration
      static_cycle_policy: dependency_inversion
    condition: TenantAdministration owns the invitation workflow command and receipt contracts while IdentityAccess verifies role assignment, identity uniqueness, active-user capacity, and enrollment on the caller transaction.

retired_modules:
  - CommsCore.InAppNotifications
  - CommsCore.PushSubscriptions

