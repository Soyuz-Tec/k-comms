read_model_exceptions:
  - id: operations-cross-context-read-model
    module: CommsCore.Operations
    mode: read_only
    owners: [identity_access, tenant_administration, conversations, conversation_content, notification_delivery, webhook_management, platform_eventing, platform_persistence]
    access:
      public_contracts:
        - CommsCore.Administration.AdmissionPolicy
        - CommsCore.Conversations.AdmissionUsage
      public_queries:
        - CommsCore.AdmissionQuotas.admission_policy/1
        - CommsCore.Administration.authorize_administer_tenant/1
        - CommsCore.Accounts.active_user_count/1
        - CommsCore.Accounts.authorize_view_platform_operations/1
        - CommsCore.Conversations.admission_usage/1
      source_tables: [attachments, notification_intents, webhook_deliveries, oban_jobs, outbox_events]
    condition: CommsCore.Operations may execute only the declared operational source-table reads and exact owner projection queries; owner-command calls, Repo writes, raw SQL DML or DDL, and source-table ownership are prohibited.
  - id: governance-retention-defaults
    module: CommsCore.Governance.RetentionDefaultsReader
    mode: read_only
    owners: [tenant_administration]
    access:
      public_contracts: [CommsCore.Administration.RetentionDefaults]
      public_queries: [CommsCore.Administration.retention_defaults/1]
      source_tables: []
    condition: The internal Governance reader may call only CommsCore.Administration.retention_defaults/1 and consume RetentionDefaults; it may not import TenantSettings or read or write tenant_settings directly.

