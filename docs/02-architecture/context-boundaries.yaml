    kind: business
    responsibility: Human and service identity, credentials, sessions, devices, recovery, and platform grants.
    current_contexts: [Accounts, PasswordRecovery, ServiceAccounts]
    fold_in: [PasswordRecovery, ServiceAccounts]
    public_facades: [CommsCore.Accounts, CommsCore.PasswordRecovery, CommsCore.ServiceAccounts]
    public_contracts:
      - CommsCore.Accounts.AccessContext
      - CommsCore.Accounts.AuthenticationResult
      - CommsCore.Accounts.ConversationBootstrapPort
      - CommsCore.Accounts.DeviceView
      - CommsCore.Accounts.InitialConversationCommand
      - CommsCore.Accounts.InitialConversationReceipt
      - CommsCore.Accounts.InvitedUserCommand
      - CommsCore.Accounts.NotificationCommand
      - CommsCore.Accounts.NotificationPort
      - CommsCore.Accounts.NotificationReceipt
      - CommsCore.Accounts.SessionView
      - CommsCore.Accounts.UserView
      - CommsCore.ServiceAccounts.ServiceAccountView
    internal_namespaces: [CommsCore.Accounts, CommsCore.ServiceAccounts]
    allowed_dependencies: [tenant_administration, audit, platform_eventing]
    publishes: [identity.user_created.v1, identity.session_revoked.v1]
    consumes: []
  tenant_administration:
    kind: business
    responsibility: Tenant lifecycle, tenant settings, invitations, and admission policy.
    current_contexts: [Administration, AdmissionQuotas]
    fold_in: [AdmissionQuotas]
    public_facades: [CommsCore.Administration, CommsCore.AdmissionQuotas]
    public_contracts:
      - CommsCore.Administration.AdmissionPolicy
      - CommsCore.Administration.InvitationView
      - CommsCore.Administration.RetentionDefaults
      - CommsCore.Administration.TenantSettingsView
      - CommsCore.Administration.TenantView
    internal_namespaces: [CommsCore.Administration]
    allowed_dependencies: [identity_access, audit, platform_eventing]
    publishes: [tenant.settings_changed.v1, tenant.invitation_created.v1]
    consumes: []
  conversations:
    kind: business
    responsibility: Conversation lifecycle, membership, discovery, and read cursors.
    current_contexts: [Conversations]
    fold_in: []
    public_facades: [CommsCore.Conversations]
    public_contracts:
      - CommsCore.Conversations.AdmissionUsage
      - CommsCore.Conversations.ConversationView
      - CommsCore.Conversations.MessageWriteSlot
      - CommsCore.Conversations.MembershipView
    internal_namespaces: [CommsCore.Conversations]
    allowed_dependencies: [identity_access, tenant_administration, audit, platform_eventing]
    publishes: [conversation.created.v1, conversation.membership_changed.v1]
    consumes: []
  conversation_content:
    kind: business
    responsibility: Messages, threads, mentions, reactions, revisions, attachments, and attachment safety state.
    current_contexts: [Messaging, Attachments]
    fold_in: [Attachments]
    public_facades: [CommsCore.Messaging, CommsCore.Attachments]
    public_contracts:
      - CommsCore.Messaging.MessageView
      - CommsCore.Messaging.MessageDeletionCandidate
      - CommsCore.Messaging.ReactionView
      - CommsCore.Attachments.AttachmentView
      - CommsCore.Attachments.ScanAttemptView
    internal_namespaces: [CommsCore.Messaging, CommsCore.Attachments]
    allowed_dependencies: [identity_access, conversations, tenant_administration, audit, platform_eventing]
    publishes: [content.message_created.v1, content.attachment_ready.v1, content.attachment_rejected.v1]
    consumes: [governance.content_restriction_changed.v1]
  calls:
    kind: business
    responsibility: Audio and video call lifecycle, admission, participants, and expiry.
    current_contexts: [AudioCalls]
    fold_in: []
    public_facades: [CommsCore.AudioCalls]
    public_contracts: []
    internal_namespaces: [CommsCore.AudioCalls]
    allowed_dependencies: [identity_access, conversations, tenant_administration, audit, platform_eventing]
    publishes: [calls.call_started.v1, calls.call_ended.v1, calls.participant_changed.v1]
    consumes: [conversation.membership_changed.v1, identity.session_revoked.v1]
