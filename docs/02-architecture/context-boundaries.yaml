    fold_in: [AuditExport]
    public_facades: [CommsCore.Audit, CommsCore.AuditExport]
    public_contracts: [CommsCore.Audit.Event, CommsCore.Audit.Error]
    internal_namespaces: [CommsCore.Audit]
    allowed_dependencies: []
    publishes: []
    consumes: []
  operations_read_model:
