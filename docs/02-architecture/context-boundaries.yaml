temporary_violations:
  source: docs/02-architecture/context-boundary-baseline.yaml
  policy: Relative to the checked-in baseline, new, changed, or resolved fingerprints fail CI; baseline edits require architecture review.
  exact_mapping:
    activation_mode: strict_with_explicit_deferrals
    cardinality: one_baseline_fingerprint_to_one_declaration
    required_fields: [id, fingerprint, rule, path, detail, adr, removal_condition]
    group_required_fields: [id, fingerprints, rule, adr, removal_condition]
    reject_unmapped_baseline_fingerprints: true
    reject_stale_declarations: true
    reject_duplicate_fingerprints: true
    group_policy: A group is valid only when it contains an exact fingerprints list and expands to declarations that satisfy the same one-to-one rule, path, detail, ADR, and removal-condition checks.
  removal_conditions:
    adapter_internal_module_import: Replace adapter access to owner-internal implementation modules with a declared facade or Ecto-free public contract.
    duplicate_table_mapping: No baseline exception is permitted after a table reaches one canonical schema; reject every second mapping.
    adapter_schema_import: Replace adapter-facing Ecto structs with DTOs or projections.
    foreign_schema_import: Replace owner-only Ecto schemas with an owner facade, DTO, or projection.
    internal_schema_access: Keep owner-internal schemas behind the declared implementation namespace.
    forbidden_namespace_dependency: Preserve documented one-way dependencies between internal capability namespaces.
    retired_context_module: Keep folded satellite facades retired; callers must use the owning context facade.
    undeclared_context_edge: Route access through an allowed facade, projection, command, or event.
    direct_foreign_write: Move the write behind the owning context API.
    public_ecto_contract: Return a public DTO/projection instead of an Ecto schema.
    business_context_cycle: Remove the bidirectional edge or document a narrowly reviewed exception.
    runtime_context_cycle: Remove the bidirectional runtime collaboration or document one exact invariant and removal condition.
