    current_contexts: [Operations]
    fold_in: []
    public_facades: [CommsCore.Operations]
    public_contracts: [CommsCore.Operations.TenantQuotaUsage]
    internal_namespaces: []
    allowed_dependencies: [tenant_administration, conversations, conversation_content, notification_delivery, webhook_management, platform_eventing, platform_persistence]
    publishes: []
