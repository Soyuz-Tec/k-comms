      - CommsCore.Moderation.CaseView
    internal_namespaces: [CommsCore.Governance, CommsCore.Moderation]
    allowed_dependencies: [identity_access, tenant_administration, conversations, conversation_content, calls, audit, platform_eventing]
    publishes: [governance.content_restriction_changed.v1, governance.erasure_requested.v1]
