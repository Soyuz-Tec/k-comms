version: 1
status: enforced
decision: docs/02-architecture/adr/0026-enforce-business-context-boundaries.md
enforcement:
  mode: baseline
  baseline: docs/02-architecture/context-boundary-baseline.yaml
  reject_new_violations: true

contexts:
