    responsibility: Notification preferences, intent, attempts, in-app state, push subscriptions, and delivery coordination.
    current_contexts: [Notifications]
    fold_in: [InAppNotifications, PushSubscriptions]
    public_facades: [CommsCore.Notifications]
    public_contracts:
