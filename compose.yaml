name: k-comms
services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: k_comms_dev }
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres -d k_comms_dev"], interval: 5s, timeout: 5s, retries: 20 }
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kcomms}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-this-local-password}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
  app:
    build: { context: ., target: dev }
    env_file: [.env]
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@postgres/k_comms_dev}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
    command: sh -lc "mix ecto.migrate && mix phx.server"
    ports: ["4000:4000"]
    volumes: [".:/workspace", "deps:/workspace/deps", "build:/workspace/_build"]
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_started }
volumes: { postgres-data: {}, minio-data: {}, deps: {}, build: {} }
